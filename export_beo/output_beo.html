<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banquet Event Order</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @page {
        size: A4 portrait;
        margin: 0;
      }
      body {
        font-family:
          "Roboto",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: #ffffff;
        color: #111111;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .page {
        width: 210mm;
        min-height: 297mm;
        margin: 0 auto;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }
      .header {
        width: 100%;
        background: #ffffff;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 12px 30px 12px 30px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .company-info {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-top: 2px;
      }
      .company-name {
        font-size: 13.5px;
        font-weight: 700;
        color: #000000;
      }
      .company-sub {
        font-size: 11.5px;
        font-weight: 400;
        color: #000000;
        line-height: 1.3;
      }
      .header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 7px;
        padding-top: 4px;
      }
      .doc-title {
        font-size: 16px;
        font-weight: 500;
        color: #111111;
        line-height: 1.2;
      }
      .doc-id-badge {
        display: inline-flex;
        align-items: center;
        padding: 0px 14px;
        border: 1px solid #00bd7d;
        border-radius: 50px;
        background: #dbfce7;
        font-size: 12px;
        font-weight: 500;
        color: #008234;
        letter-spacing: 0.01em;
        height: 20px;
      }
      .body {
        background: #ffffff;
        padding: 6px 30px 8px 30px;
        flex: 1;
        display: flex;
        flex-direction: column;
        height: auto;
        box-sizing: border-box;
      }
      .card {
        border: 0.8px solid #d7dedd;
        border-radius: 12px;
        overflow: hidden;
        background: #ffffff;
      }
      .row-4col {
        display: grid;
        grid-template-columns: 25% 25% 23% 27%;
        padding: 11px;
      }
      .row-4col:last-child {
        border-bottom: none;
        padding: 0 11px 11px 11px;
      }
      .cell:last-child {
        border-right: none;
      }
      .cell-label {
        font-size: 10px;
        color: #8a8a91;
        font-weight: 500;
        margin-bottom: 5px;
      }
      .cell-value {
        font-size: 10px;
        color: #000000;
        font-weight: 400;
      }
      .badge-yellow {
        display: inline-flex;
        align-items: center;
        padding: 0px 12px;
        border: 1px solid #f0b101;
        border-radius: 50px;
        background: #fefbe8;
        font-size: 10px;
        font-weight: 500;
        color: #a55f00;
        height: 20px;
      }

      .print-footer-wrapper {
        margin-top: 8px;
        padding: 6px 30px 10px 30px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .print-footer-spacer {
        display: none;
      }
      .print-layout-table {
        width: 100%;
        border-collapse: collapse;
      }
      .print-layout-table td {
        padding: 0;
        border: none;
      }
      .print-layout-table tbody td {
        height: auto;
      }
      .signer-spacer {
        height: 28px;
        flex-shrink: 0;
      }
      @media print {
        .print-layout-table {
          height: auto;
          width: 100%;
        }
        .body {
          height: auto;
        }
        .print-layout-table thead {
          display: table-header-group;
        }
        .print-layout-table tfoot {
          display: table-footer-group;
        }
        .print-footer-spacer {
          display: block;
          height: 50px;
        }
        .print-footer-wrapper {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          height: 50px;
          padding: 6px 30px 10px 30px;
          background: #ffffff;
          box-sizing: border-box;
          z-index: 9999;
          margin-top: 0;
        }
      }
      .print-info {
        font-size: 10px;
        color: #8a8a91;
        font-weight: 500;
        text-align: left;
      }
      .print-footer-separator {
        border: none;
        border-top: 1px solid #d1d5db;
        margin: 0;
      }
      .print-footer-note {
        font-size: 10px;
        color: #111827;
        text-align: justify;
        line-height: 1.4;
      }

      .product-table-wrapper {
        border: 1px solid #f3e5ff;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 8px;
        background: #ffffff;
      }
      .product-table {
        width: 100%;
        border-collapse: collapse;
        font-family: "Roboto", sans-serif;
        color: #111111;
      }
      .product-table th {
        background-color: #faf5ff;
        color: #111111;
        font-weight: 600;
        text-align: left;
        padding: 6.5px 9px;
        font-size: 10px;
      }
      .product-table td {
        padding: 6.5px 9px;
        border-bottom: 1px solid #ececec;
        font-size: 10px;
        color: #111111;
      }
      .product-table tr:last-child td {
        border-bottom: none;
      }
      .badge-stay {
        display: inline-flex;
        align-items: center;
      }
      .badge-stay-date {
        height: 26px;
        display: flex;
        align-items: center;
        padding: 0px 9px;
        font-size: 10px;
        color: #44444c;
        font-weight: 500;
        white-space: nowrap;
        border-width: 1px 0px 1px 1px;
        border-style: solid;
        border-color: #b0b0b5;
        border-radius: 12px 0px 0px 12px;
      }
      .badge-stay-duration {
        height: 26px;
        display: flex;
        align-items: center;
        padding: 0px 10px;
        background-color: #000000;
        color: #ffffff;
        font-size: 10px;
        font-weight: 500;
        border-radius: 0px 20px 20px 0px;
        white-space: nowrap;
      }
      @media print {
        body {
          margin: 0;
        }
        .page {
          width: 210mm;
          min-height: auto;
          height: auto;
          margin: 0;
          page-break-after: avoid;
          overflow: visible;
        }
      }
      .card-event {
        position: relative;
        overflow: hidden;
      }
      .ribbon-draft {
        position: absolute;
        top: 0;
        right: 0;
        width: 70px;
        height: 70px;
        overflow: hidden;
        pointer-events: none;
      }
      .ribbon-draft span {
        position: absolute;
        display: block;
        width: 100px;
        padding: 4px 0;
        background-color: #8a8a91;
        color: #ffffff;
        font-size: 10px;
        font-weight: 700;
        text-align: center;
        right: -24px;
        top: 14px;
        transform: rotate(45deg);
      }
      .ribbon-approved span {
        background-color: #00bd7d;
      }

       
      .notes-and-signer-container {
        display: block;
        width: 100%;
         
        page-break-inside: auto !important;
        break-inside: auto !important;
      }

      .notes-container {
        display: block;
        width: 100%;
        margin-top: 10px;

        column-count: 3;
        column-gap: 10px;
        column-fill: balance;  

        height: auto;
      }

      .note-card {
        display: inline-block;  
        width: 100%;
        border: 1px solid #ffecd7;
        border-radius: 10px;
        background: #ffffff;
        margin-bottom: 8px;

        break-inside: avoid;
        -webkit-column-break-inside: avoid;
        page-break-inside: avoid;
      }
      .note-header {
        background-color: #fffaf5;
        padding: 5px 10px;
        font-size: 10px;
        font-weight: 700;
        color: #000000;
        border-bottom: 1px solid #ffecd7;
        border-radius: 10px 10px 0 0;
      }
      .note-body {
        padding: 5px 10px;
        font-size: 10px;
        color: #111111;
        line-height: 1.4;
        white-space: pre-line;
      }

       
      .signer-section {
        display: grid;
        grid-template-columns: repeat(6, 1fr) 55px;
        gap: 8px;
        align-items: end;

         
        page-break-inside: avoid;
        break-inside: avoid;

         
        page-break-before: avoid;
        break-before: avoid;
      }
      .signer-col {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 50px;
        text-align: center;
      }
      .signer-title {
        font-size: 9px;
        font-weight: 500;
        color: #000000;
      }
      .signer-name {
        font-size: 9px;
        font-weight: 400;
        color: #000000;
        margin-top: auto;
        margin-left: auto;
        margin-right: auto;
        border-top: 0.5px solid #b0b0b5;
        padding-top: 4px;
        width: 102px;
        white-space: nowrap;
      }
      .signer-qr {
        width: 55px;
        height: 55px;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <table class="print-layout-table">
        <thead>
          <tr>
            <td>
              <header class="header">
                <div class="header-left">
