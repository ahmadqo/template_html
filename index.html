      :root {
        --bg-main: #f8f6fb; /* Sangat cerah, abu-abu dengan tint ungu sangat tipis */
        --bg-card: #ffffff;
        --bg-card-hover: #ffffff;
        --border-color: rgba(126, 34, 206, 0.08);
        --border-hover: rgba(126, 34, 206, 0.25);

        --text-primary: #1e1b4b; /* Indigo gelap untuk keterbacaan tinggi */
        --text-secondary: #475569; /* Slate gelap untuk sub-teks */
        --text-muted: #64748b; /* Slate medium */

        --accent-purple: #7e22ce;
        --accent-pink: #d946ef;
        --accent-gradient: linear-gradient(135deg, #d946ef 0%, #7e22ce 100%);
        --accent-gradient-hover: linear-gradient(
          135deg,
          #e879f9 0%,
          #9333ea 100%
        );

        --color-email: #7e22ce;
        --color-pdf: #e11d48;

        --font-sans: "Outfit", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: "JetBrains Mono", monospace;

        --shadow-card:
          0 10px 25px -5px rgba(126, 34, 206, 0.05),
          0 8px 16px -6px rgba(126, 34, 206, 0.05);
        --shadow-card-hover:
          0 20px 35px -10px rgba(126, 34, 206, 0.12),
          0 12px 20px -8px rgba(126, 34, 206, 0.08);
        --shadow-glow: 0 4px 20px rgba(126, 34, 206, 0.04);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-main);
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(217, 70, 239, 0.06) 0px,
            transparent 40%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(126, 34, 206, 0.05) 0px,
            transparent 40%
          );
        background-attachment: fixed;
        color: var(--text-primary);
        font-family: var(--font-sans);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      /* ==========================================================================
           Header Section
           ========================================================================== */
      header {
        text-align: center;
        margin-bottom: 40px;
        position: relative;
      }

      .logo-area {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 54px;
        height: 54px;
        background: var(--accent-gradient);
        border-radius: 14px;
        margin-bottom: 16px;
        box-shadow: 0 8px 16px -4px rgba(126, 34, 206, 0.3);
      }

      .logo-area svg {
        width: 28px;
        height: 28px;
        fill: white;
      }

      header h1 {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      header p {
        color: var(--text-secondary);
        font-size: 15px;
        max-width: 500px;
        margin: 0 auto;
      }

      /* ==========================================================================
           Controls: Search & Filter Tabs
           ========================================================================== */
      .controls-wrapper {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--border-color);
        padding: 16px 20px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
        margin-bottom: 30px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: var(--shadow-glow);
      }

      @media (min-width: 768px) {
        .controls-wrapper {
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
        }
      }

      /* Filter Chips */
      .filter-tabs {
        display: flex;
        gap: 8px;
      }

      .filter-btn {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(126, 34, 206, 0.1);
        color: var(--text-secondary);
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .filter-btn:hover {
        color: var(--accent-purple);
        background: #ffffff;
        border-color: rgba(126, 34, 206, 0.25);
      }

      .filter-btn.active {
        background: var(--accent-gradient);
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(126, 34, 206, 0.2);
      }

      /* Search Input */
      .search-box {
        position: relative;
        flex: 1;
        max-width: 360px;
      }

      .search-box input {
        width: 100%;
        background: #ffffff;
        border: 1px solid rgba(126, 34, 206, 0.15);
        border-radius: 10px;
        padding: 10px 16px 10px 38px;
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 14px;
        transition: all 0.2s;
      }

      .search-box input:focus {
        outline: none;
        background: #ffffff;
        border-color: var(--accent-pink);
        box-shadow: 0 0 10px rgba(217, 70, 239, 0.15);
      }

      .search-box svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        fill: var(--text-muted);
        pointer-events: none;
      }

      /* ==========================================================================
           Templates Table
           ========================================================================== */
      .table-container {
        width: 100%;
        overflow-x: auto;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        box-shadow: var(--shadow-card);
        margin-bottom: 30px;
      }

      .template-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        min-width: 750px;
      }

      .template-table th,
      .template-table td {
        padding: 16px 20px;
        vertical-align: middle;
        border-bottom: 1px solid rgba(126, 34, 206, 0.04);
      }

      .template-table th {
        background: rgba(126, 34, 206, 0.02);
        color: var(--text-primary);
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.5px;
        border-bottom: 1px solid rgba(126, 34, 206, 0.08);
      }

      .template-table tbody tr {
        transition: background-color 0.2s ease;
      }

      .template-table tbody tr:hover {
        background-color: rgba(126, 34, 206, 0.02);
      }

      .template-table tbody tr:last-child td {
        border-bottom: none;
      }

      .card-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 20px;
        display: inline-block;
      }

      .badge-email {
        background: rgba(126, 34, 206, 0.06);
        color: var(--color-email);
        border: 1px solid rgba(126, 34, 206, 0.12);
      }

      .badge-pdf {
        background: rgba(225, 29, 72, 0.06);
        color: var(--color-pdf);
        border: 1px solid rgba(225, 29, 72, 0.12);
      }

      .template-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .template-filename {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-muted);
      }

      /* Table Actions buttons */
      .table-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .table-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(126, 34, 206, 0.04);
        border: 1px solid rgba(126, 34, 206, 0.1);
        border-radius: 8px;
        color: var(--accent-purple);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .table-btn:hover {
        background: var(--accent-gradient);
        border-color: transparent;
        color: #ffffff;
        box-shadow: 0 4px 12px rgba(126, 34, 206, 0.2);
      }

        background: var(--accent-gradient);
        color: #ffffff;
        border-color: transparent;
      }

      .table-btn-primary:hover {
        background: var(--accent-gradient-hover);
        box-shadow: 0 4px 12px rgba(126, 34, 206, 0.3);

        border-radius: 16px;
        margin-bottom: 30px;
      }

        height: 48px;
        fill: var(--text-muted);
        margin-bottom: 12px;

            filename: "export_po.html",
            viewUrl: "export_bo/export_po/export_po.html",
            outputUrl: "export_bo/export_po/output_po.html",
          },
          {
            id: 32,
            type: "pdf",
            badgeLabel: "PDF",
            name: "Store Request",
            searchName: "export store request printout cetak permintaan toko",
            filename: "export_sr.html",
            viewUrl: "export_bo/export_sr/export_sr.html",
            outputUrl: "export_bo/export_sr/output_sr.html",
          },
          {
            id: 33,
            type: "pdf",
            badgeLabel: "PDF",
            name: "Quotation",
            searchName: "export quotation printout cetak quotation",
            filename: "export_quotation.html",
            viewUrl: "export_bo/export_quotation/export_quotation.html",
            outputUrl: "export_bo/export_quotation/output_quotation.html",
          },
          {
            id: 34,
            type: "pdf",
            badgeLabel: "PDF",
            name: "DML",
            searchName: "export dml printout cetak dml",
            filename: "export_dml.html",
            viewUrl: "export_bo/export_dml/export_dml.html",
            outputUrl: "export_bo/export_dml/output_dml.html",
          },
        ];

        let currentFilter = "all";
        let searchQuery = "";

        // Fungsi untuk merender list tabel secara dinamis
        function renderTemplates(data) {
          templatesBody.innerHTML = "";

          if (data.length === 0) {
            noResults.style.display = "block";
            return;
          }
          noResults.style.display = "none";

          data.forEach((template) => {
            const tr = document.createElement("tr");
            tr.setAttribute("data-type", template.type);
            tr.setAttribute("data-name", template.searchName);

            // 1. Cell Tipe
            const tdType = document.createElement("td");
            const badgeClass =
              template.type === "email" ? "badge-email" : "badge-pdf";
            tdType.innerHTML = `<span class="card-badge ${badgeClass}">${template.badgeLabel}</span>`;
            tr.appendChild(tdType);

            // 2. Cell Nama Template
            const tdName = document.createElement("td");
            tdName.innerHTML = `<span class="template-title">${template.name}</span>`;
            tr.appendChild(tdName);

            // 3. Cell Nama File
            const tdFilename = document.createElement("td");
            tdFilename.innerHTML = `<span class="template-filename">${template.filename}</span>`;
            tr.appendChild(tdFilename);

            // 4. Cell Aksi
            const tdAction = document.createElement("td");
            const actionDiv = document.createElement("div");
            actionDiv.className = "table-actions";

            // Tombol Buka Template
            const btnView = document.createElement("a");
            btnView.href = template.viewUrl;
            btnView.target = "_blank";
            btnView.className = "table-btn";
            btnView.textContent = "Buka Template";
            if (template.type === "pdf") {
              btnView.title = "Lihat kode template Go HTML";
            }
            actionDiv.appendChild(btnView);

            // Tombol Hasil Cetak (jika ada output)
            if (template.outputUrl) {
              const btnOutput = document.createElement("a");
              btnOutput.href = template.outputUrl;
              btnOutput.target = "_blank";
              btnOutput.className =
                "table-btn table-btn-primary table-btn-output";
              btnOutput.textContent = "Hasil Cetak";
              btnOutput.title = "Lihat hasil cetak PDF simulasi";

              // Logika Auto-Print saat tombol Hasil Cetak diklik
              btnOutput.addEventListener("click", (e) => {
                e.preventDefault();
                const win = window.open(template.outputUrl, "_blank");
                if (win) {
                  const timer = setInterval(() => {
                    try {
                      if (win.document.readyState === "complete") {
                        clearInterval(timer);
                        win.print();
                      }
                    } catch (err) {
                      clearInterval(timer);
                      console.warn(
                        "Auto-print preview is disabled on direct file:// protocol due to browser security restrictions.",
                      );
                    }
                  }, 100);
                }
              });

              actionDiv.appendChild(btnOutput);
            }

            tdAction.appendChild(actionDiv);
            tr.appendChild(tdAction);
            templatesBody.appendChild(tr);
          });
        }

        // Fungsi penyaringan gabungan untuk filter & search
        function updateFilteredTemplates() {
          const filtered = templates.filter((template) => {
            const matchesFilter =
              currentFilter === "all" || template.type === currentFilter;

            const searchString = (
              template.name +
              " " +
              template.filename +
              " " +
              template.searchName
            ).toLowerCase();
            const matchesSearch = searchString.includes(searchQuery);

            return matchesFilter && matchesSearch;
          });

          renderTemplates(filtered);
        }

        // Tabs click handler
        filterButtons.forEach((btn) => {
          btn.addEventListener("click", (e) => {
            filterButtons.forEach((b) => b.classList.remove("active"));
            e.target.classList.add("active");
            currentFilter = e.target.getAttribute("data-filter");
            updateFilteredTemplates();
          });
        });

        // Search input handler
        searchInput.addEventListener("input", (e) => {
          searchQuery = e.target.value.toLowerCase().trim();
          updateFilteredTemplates();
        });

        // Render pertama kali saat load
        updateFilteredTemplates();
      });
    </script>
  </body>
</html>
